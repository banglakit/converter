name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build wasm + site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: pages-wasm
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - name: Build banglakit-wasm
        run: wasm-pack build crates/banglakit-wasm --target web --release --out-dir ../../web/pkg
      # NOTE: wasm-opt is intentionally not run. wasm-bindgen 0.2.121's
      # generated init code calls `WebAssembly.Table.grow(4)` on the
      # externref table, and binaryen's -Oz pass strips the table's grow
      # capability, producing a wasm that fails to initialize at runtime
      # ("RangeError: WebAssembly.Table.grow(): failed to grow table by 4").
      # The un-optimized wasm is ~1.7 MB (≈500 KB gzipped over the wire),
      # which is acceptable. Re-enable with `--enable-reference-types` once
      # we've verified the flag works with the runner's binaryen version.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
