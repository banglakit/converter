# Sources: hindityping.info Bangla font list, omicronlab font catalogue,
# Mad-FOX/bijoy2unicode README. PRD §6 enumerates 128+ variants; only the
# most-cited families are listed by name here, with the *MJ-suffix rule
# covering the rest.

